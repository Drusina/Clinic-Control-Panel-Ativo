      type: object
      properties:
        confirmar:
          type: boolean
          description: "Confirmação explícita do super-admin para liberar a geração."
        chaveLiberacao:
          type: string
          minLength: 1
          description: "Chave de liberação manual do super-admin (igual ao segredo de super-admin), exigida para liberar a geração em lote."
      required:
        - confirmar
        - chaveLiberacao

    GerarFaturasContratoResponse:
      type: object
      properties:
        criadas: { type: integer }
        faturas:
          type: array
          items:
            $ref: "#/components/schemas/Fatura"
      required:
        - criadas
        - faturas

