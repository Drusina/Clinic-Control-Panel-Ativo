  # ─── TRILHA DE IMPLEMENTAÇÃO ────────────────────────────────────────────────
  /clinics/{clinicId}/trilha:
    get:
      operationId: getTrilha
      tags: [trilha]
      summary: Get the 15-stage implementation journey for a clinic
      description: >
        Returns the fixed 15 stages with their per-clinic state merged with a
        live "pronto para concluir" suggestion derived from existing module
        data, plus the derived clinic-level summary (etapa atual + progresso %).
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Trilha
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trilha"
        "404":
          description: Clinic not found

  /clinics/{clinicId}/trilha/{etapaKey}:
    patch:
      operationId: updateTrilhaEtapa
      tags: [trilha]
      summary: Confirm/reopen/block a stage or edit its fields
      description: >
        Hybrid progression — the system only suggests; this endpoint applies an
        explicit human decision. Updates the stage status (concluir, reabrir,
        bloquear, marcar não se aplica) and/or its responsável, data prevista
        and observação. Recomputes the clinic's etapa/progresso and records an
        audit entry. Returns the full refreshed trilha.
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
        - name: etapaKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TrilhaEtapaUpdate"
      responses:
        "200":
          description: Updated trilha
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trilha"
        "400":
          description: Invalid stage key or body
        "404":
          description: Clinic not found

