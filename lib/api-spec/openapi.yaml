      summary: Import Sistemas e Acessos xlsx into the clinic
      description: |
        Accepts a multipart/form-data upload (`file` field, max 2MB) containing
        the Sistemas e Acessos spreadsheet. Systems are matched by the
        composite key (lower(nome) + lower(fornecedor) + lower(tipo)); matched
        rows are merged (only non-null spreadsheet values overwrite existing
        data). Does NOT dispatch invites.
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: .xlsx workbook (≤ 2MB)
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                required: [created, updated, skipped, errors]
                properties:
                  created: { type: integer }
                  updated: { type: integer }
                  skipped: { type: integer }
                  errors:
                    type: array
                    items:
                      type: object
                      required: [row, message]
                      properties:
                        row: { type: integer }
                        field: { type: ["string", "null"] }
                        message: { type: string }
        "400":
          description: Invalid file or header
        "409":
          description: Import rolled back due to per-row failure
        "413":
          description: File exceeds 2MB

