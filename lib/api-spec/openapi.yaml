openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: CCP IONEX — Clinic Control Panel API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: clinics
    description: Clinic management
  - name: dashboard
    description: Dashboard summaries
  - name: kickoffs
    description: Kickoff management
  - name: diagnostics
    description: Diagnosis and scoring
  - name: actions
    description: Action plan (kanban)
  - name: risks
    description: Risk management
  - name: trilha
    description: Implementation journey (15-stage trilha)
  - name: team
    description: Team members
  - name: activity
    description: Activity timeline
  - name: notifications
    description: Notifications
  - name: faturas
    description: Invoices/Faturas
  - name: comercial
    description: Central Comercial (condições comerciais e documentos comerciais)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── DASHBOARD ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/pipeline:
    get:
      operationId: getDashboardPipeline
      tags: [dashboard]
      summary: Get pipeline breakdown by status
      responses:
        "200":
          description: Pipeline data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PipelineItem"

  /dashboard/recent-activity:
    get:
      operationId: getDashboardRecentActivity
      tags: [dashboard]
      summary: Get recent activity across all clinics
      responses:
        "200":
          description: Recent activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /dashboard/diagnostics:
    get:
      operationId: getDashboardDiagnostics
      tags: [dashboard]
      summary: Get recently completed diagnostics overview for all clinics
      responses:
        "200":
          description: Diagnostics overview
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiagnosticsOverviewItem"

  # ─── CLINICS ────────────────────────────────────────────────────────────────
  /clinics:
    get:
      operationId: listClinics
      tags: [clinics]
      summary: List all clinics
      parameters:
        - name: status
          in: query
          schema:
            type: ["string", "null"]
        - name: plano
          in: query
          schema:
            type: ["string", "null"]
        - name: search
          in: query
          schema:
            type: ["string", "null"]
        - name: page
          in: query
          schema:
            type: ["integer", "null"]
        - name: pageSize
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Clinics list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClinicListResponse"
    post:
      operationId: createClinic
      tags: [clinics]
      summary: Create a new clinic
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClinicBody"
      responses:
        "201":
          description: Created clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  /clinics/{id}:
    get:
      operationId: getClinic
      tags: [clinics]
      summary: Get a clinic by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
        "404":
          description: Not found
    patch:
      operationId: updateClinic
      tags: [clinics]
      summary: Update a clinic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClinicBody"
      responses:
        "200":
          description: Updated clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"
    delete:
      operationId: deleteClinic
      tags: [clinics]
      summary: Delete a clinic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /clinics/{id}/status:
    patch:
      operationId: updateClinicStatus
      tags: [clinics]
      summary: Change clinic status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClinicStatusBody"
      responses:
        "200":
          description: Updated clinic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Clinic"

  # ─── STATUS HISTORY ─────────────────────────────────────────────────────────
  /clinics/{id}/status-history:
    get:
      operationId: getClinicStatusHistory
      tags: [clinics]
      summary: Get clinic status change history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Status history list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StatusHistory"

  # ─── SOCIOS ─────────────────────────────────────────────────────────────────
  /clinics/{clinicId}/socios:
    get:
      operationId: listSocios
      tags: [clinics]
      summary: List partners (QSA) for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Socios list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Socio"
    post:
      operationId: createSocio
      tags: [clinics]
      summary: Add a partner to a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSocioBody"
      responses:
        "201":
          description: Created socio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Socio"

  /clinics/{clinicId}/socios/{socioId}:
    patch:
      operationId: updateSocio
      tags: [clinics]
      summary: Update a partner
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
        - name: socioId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSocioBody"
      responses:
        "200":
          description: Updated socio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Socio"
    delete:
      operationId: deleteSocio
      tags: [clinics]
      summary: Remove a partner
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
        - name: socioId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  # ─── SOCIETARY DOCS (AI extraction) ─────────────────────────────────────────
  # Note: o endpoint de upload (POST /clinics/{clinicId}/societary-docs) é
  # multipart/form-data e por isso não é descrito no OpenAPI — o frontend usa
  # `useUploadSocietaryDoc()` (artifacts/ccp/src/hooks/use-societary-docs.ts).
  /clinics/{clinicId}/societary-docs:
    get:
      operationId: listSocietaryDocs
      tags: [societary-docs]
      summary: Lista análises societárias (Contrato Social / Alterações / Acordo de Sócios)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SocietaryDoc"
  /clinics/{clinicId}/societary-docs/{id}:
    delete:
      operationId: deleteSocietaryDoc
      tags: [societary-docs]
      summary: Remove a análise societária (o documento permanece na biblioteca)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
  /clinics/{clinicId}/societary-docs/{id}/signed-url:
    get:
      operationId: getSocietaryDocSignedUrl
      tags: [societary-docs]
      summary: URL assinada para abrir o arquivo
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                required:
                  - url
  /clinics/{clinicId}/societary-docs/{id}/apply:
    post:
      operationId: applySocietaryExtraction
      tags: [societary-docs]
      summary: Aplica sugestões da IA na clínica e nos sócios (não sobrescreve campos preenchidos)
      parameters:
        - in: path
          name: clinicId
          required: true
          schema:
            type: string
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplySocietaryBody"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplySocietaryResponse"

  # ─── USER INVITE ─────────────────────────────────────────────────────────────
  /clinics/{id}/invite-user:
    post:
      operationId: inviteClinicUser
      tags: [clinics]
      summary: Invite a user to a clinic via email
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteUserBody"
      responses:
        "200":
          description: Invite sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteUserResponse"

  /clinics/{id}/team/{teamMemberId}/resend-invite:
    post:
      operationId: resendClinicTeamInvite
      tags: [clinics]
      summary: Resend platform invite to an existing team member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: teamMemberId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Invite resent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InviteUserResponse"

  # ─── ACTIVITY ───────────────────────────────────────────────────────────────
  /clinics/{clinicId}/activity:
    get:
      operationId: getClinicActivity
      tags: [activity]
      summary: Get clinic activity timeline
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createClinicActivity
      tags: [activity]
      summary: Add activity to clinic timeline
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityBody"
      responses:
        "201":
          description: Created activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  # ─── KICKOFFS ───────────────────────────────────────────────────────────────
  /clinics/{clinicId}/kickoff:
    get:
      operationId: getKickoff
      tags: [kickoffs]
      summary: Get kickoff for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Kickoff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kickoff"
        "404":
          description: Not found
    put:
      operationId: upsertKickoff
      tags: [kickoffs]
      summary: Create or update kickoff
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertKickoffBody"
      responses:
        "200":
          description: Kickoff
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Kickoff"

  # ─── DIAGNOSTICS ────────────────────────────────────────────────────────────
  /clinics/{clinicId}/diagnostics:
    get:
      operationId: listDiagnostics
      tags: [diagnostics]
      summary: List diagnostics for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diagnostics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Diagnostic"
    post:
      operationId: createDiagnostic
      tags: [diagnostics]
      summary: Start a new diagnostic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Created diagnostic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnostic"

  /diagnostics/{id}:
    get:
      operationId: getDiagnostic
      tags: [diagnostics]
      summary: Get a diagnostic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Diagnostic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnostic"

  /diagnostics/{id}/complete:
    post:
      operationId: completeDiagnostic
      tags: [diagnostics]
      summary: Mark diagnostic as complete and calculate score
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Completed diagnostic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnostic"

  /diagnostics/{id}/reopen:
    post:
      operationId: reopenDiagnostic
      tags: [diagnostics]
      summary: Reopen a completed diagnostic so answers can be edited again
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reopened diagnostic
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnostic"

  /diagnostics/{id}/calculate-scores:
    post:
      operationId: calculateDiagnosticScores
      tags: [diagnostics]
      summary: Recalculate scores for a diagnostic based on current responses
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated diagnostic with recalculated scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Diagnostic"

  /clinics/{clinicId}/diagnostics/{diagnosticoId}/hydrated:
    get:
      operationId: getHydratedDiagnostic
      tags: [diagnostics]
      summary: Get a diagnostic with pillars, questions, respostas, delegacoes and team in one call
      parameters:
        - { name: clinicId, in: path, required: true, schema: { type: string } }
        - { name: diagnosticoId, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Hydrated diagnostic payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HydratedDiagnostic"

  /perguntas:
    get:
      operationId: listAllPerguntas
      tags: [diagnostics]
      summary: List every pergunta across all pilares
      responses:
        "200":
          description: All perguntas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DiagnosticQuestion" }
    post:
      operationId: createPergunta
      tags: [diagnostics]
      summary: Create a new pergunta (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PerguntaInput" }
      responses:
        "201":
          description: Created pergunta
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DiagnosticQuestion" }

  /perguntas/{id}:
    patch:
      operationId: updatePergunta
      tags: [diagnostics]
      summary: Update a pergunta (super_admin only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PerguntaInput" }
      responses:
        "200":
          description: Updated pergunta
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DiagnosticQuestion" }
    delete:
      operationId: deletePergunta
      tags: [diagnostics]
      summary: Delete a pergunta (super_admin only); pass ?force=true to cascade respostas
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: force, in: query, required: false, schema: { type: boolean } }
      responses:
        "204": { description: Deleted }

  /perguntas/import:
    post:
      operationId: importPerguntasJson
      tags: [diagnostics]
      summary: Bulk import perguntas via JSON (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [items]
              properties:
                items:
                  type: array
                  items: { $ref: "#/components/schemas/PerguntaInput" }
                upsert: { type: boolean }
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PerguntasImportResult" }

  /perguntas/import-file:
    post:
      operationId: importPerguntasFile
      tags: [diagnostics]
      summary: Bulk import perguntas via CSV/XLSX upload (super_admin only)
      parameters:
        - name: dryRun
          in: query
          required: false
          schema: { type: boolean }
          description: When true, validates and computes the diff but does not write to the database.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PerguntasImportResult" }

  /perguntas/reset-to-seed:
    post:
      operationId: resetPerguntasToSeed
      tags: [diagnostics]
      summary: Re-seed any missing perguntas from the built-in bank (super_admin only)
      responses:
        "200":
          description: Seed result
          content:
            application/json:
              schema:
                type: object
                required: [inserted, total]
                properties:
                  inserted: { type: integer }
                  total: { type: integer }

  /diagnostic/pillars:
    get:
      operationId: listDiagnosticPillars
      tags: [diagnostics]
      summary: List all diagnostic pillars
      responses:
        "200":
          description: List of pillars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiagnosticPillar"

  /diagnostic/pillars/{pillarSlug}/questions:
    get:
      operationId: getDiagnosticPillarQuestions
      tags: [diagnostics]
      summary: Get questions for a specific pillar
      parameters:
        - name: pillarSlug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Questions for the pillar
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiagnosticQuestion"

  /diagnostics/{id}/respostas/batch:
    post:
      operationId: batchSaveDiagnosticRespostas
      tags: [diagnostics]
      summary: Batch save multiple responses for a diagnostic
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchSaveRespostasBody"
      responses:
        "200":
          description: Saved responses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiagnosticResposta"

  # ─── ACTIONS (KANBAN) ────────────────────────────────────────────────────────
  /clinics/{clinicId}/actions:
    get:
      operationId: listActions
      tags: [actions]
      summary: List action plan items for a clinic
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
        - name: coluna
          in: query
          schema:
            type: ["string", "null"]
      responses:
        "200":
          description: Actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Action"
    post:
      operationId: createAction
      tags: [actions]
      summary: Create action item
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActionBody"
      responses:
        "201":
          description: Created action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Action"

  /actions/{id}:
    patch:
      operationId: updateAction
      tags: [actions]
      summary: Update action (move column, update status, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateActionBody"
      responses:
        "200":
          description: Updated action
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Action"
    delete:
      operationId: deleteAction
      tags: [actions]
      summary: Delete action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /actions/{id}/detail:
    get:
      operationId: getActionDetail
      tags: [actions]
      summary: Get full action detail (action, linked risk, checklist, evidence links, notes)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionDetail"
        "404":
          description: Not found

  /actions/{id}/checklist:
    post:
      operationId: addChecklistItem
      tags: [actions]
      summary: Add a checklist item to an action
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
