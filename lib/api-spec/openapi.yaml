        só é marcado como assinado quando todas assinarem).
      properties:
        signatario:
          $ref: "#/components/schemas/ComercialSignatarioInput"
        signatarios:
          type: array
          items:
            $ref: "#/components/schemas/ComercialSignatarioInput"

