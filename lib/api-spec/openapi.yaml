      responses:
        "201":
          description: Created team member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamMember"

  /clinics/{clinicId}/team/template:
    get:
      operationId: downloadTeamTemplate
      tags: [team]
      summary: Download Quadro Funcional xlsx template prefilled with clinic header
      description: |
        Returns an .xlsx workbook with the clinic name, CNPJ, city/UF and
        instruction header rows, plus the Quadro Funcional column headers
        ready to be filled and re-imported via POST /clinics/{clinicId}/team/import.
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: xlsx file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /clinics/{clinicId}/team/bulk-invite:
    post:
      operationId: bulkInviteTeamMembers
      tags: [team]
      summary: Send platform invites to many team members at once
      description: |
        For each `memberIds[]` belonging to the clinic, sets `temAcessoPlataforma=true`
        and dispatches an invite (Supabase + email fallback). Members without a valid
        e-mail or already active are skipped. Returns per-member results.
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [memberIds]
              properties:
                memberIds:
                  type: array
                  items:
                    type: string
                  maxItems: 200
      responses:
        "200":
          description: Bulk invite summary
          content:
            application/json:
              schema:
                type: object
                required: [sent, skipped, failed, total, results]
                properties:
                  sent: { type: integer }
                  skipped: { type: integer }
                  failed: { type: integer }
                  total: { type: integer }
                  results:
                    type: array
                    items:
                      type: object
                      required: [id, nome, status]
                      properties:
                        id: { type: string }
                        nome: { type: string }
                        status:
                          type: string
                          enum: [sent, pending, skipped_no_email, skipped_already_active, not_found, error]
                        reason:
                          type: ["string", "null"]
        "400":
          description: Invalid request body

  /clinics/{clinicId}/team/import:
    post:
      operationId: importTeamSpreadsheet
      tags: [team]
      summary: Import Quadro Funcional xlsx into the clinic team
      description: |
        Accepts a multipart/form-data upload (`file` field, max 2MB) containing
        the Quadro Funcional spreadsheet. Members are matched first by CPF, then
        by unambiguous lowercased e-mail; matched rows are merged (only non-null
        spreadsheet values overwrite existing data). Does NOT dispatch invites.
      parameters:
        - name: clinicId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: .xlsx workbook (≤ 2MB)
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                type: object
                required: [created, updated, skipped, errors]
                properties:
                  created:
                    type: integer
                  updated:
                    type: integer
                  skipped:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      required: [row, message]
                      properties:
                        row:
                          type: integer
                        field:
                          type: ["string", "null"]
                        message:
                          type: string
        "400":
          description: Invalid file or header
        "413":
          description: File exceeds 2MB

