<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IONEX360 — Super Admin (shell completo)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.31.0/dist/tabler-icons.min.css">
<style>
  :root{
    --ink:#131B2E; --ink-2:#58607A; --ink-3:#8C92A6;
    --paper:#F4F5F8; --surface:#FFFFFF; --surface-2:#F8F9FC;
    --line:#E4E7EF; --line-2:#D6DAE5;
    --brand:#16274D; --brand-700:#0F1C3A; --brand-50:#E8EBF3;
    --gold:#C49A3D; --gold-600:#9F7C29; --gold-50:#F7F0DC;
    --ok:#2E7D5B; --ok-50:#E5F1EA; --warn:#B5742A; --warn-50:#F7EEDD; --crit:#A83A3A; --crit-50:#F6E6E3;
    --display:'Bricolage Grotesque',system-ui,sans-serif; --body:'Inter',system-ui,sans-serif;
    --side-w:256px;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:var(--display);font-weight:600;margin:0;letter-spacing:-0.01em;}
  button{font-family:var(--body);cursor:pointer;}

  .app{display:grid;grid-template-columns:var(--side-w) 1fr;grid-template-rows:60px 1fr;grid-template-areas:"side top" "side main";min-height:100vh;}

  /* sidebar */
  .side{grid-area:side;background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;}
  .brand{display:flex;align-items:center;gap:10px;padding:16px 18px 12px;}
  .brand .nm{font-family:var(--display);font-weight:600;font-size:18px;color:var(--brand);}
  .brand .nm span{color:var(--gold);}
  .nav{flex:1;overflow-y:auto;padding:4px 12px;}
  .navgroup{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);font-weight:600;margin:13px 10px 5px;}
  .navitem{width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;background:transparent;border-radius:9px;color:var(--ink-2);font-size:13.5px;text-align:left;margin:1px 0;}
  .navitem:hover{background:var(--surface-2);color:var(--ink);}
  .navitem.active{background:var(--brand-50);color:var(--brand);font-weight:500;}
  .navitem i{font-size:17px;width:19px;text-align:center;}
  .navitem.sub{padding-left:30px;font-size:13px;}
  .navitem .gd{margin-left:auto;width:7px;height:7px;border-radius:50%;background:var(--gold);}
  .navfoot{border-top:1px solid var(--line);padding:8px 12px;}

  /* topbar */
  .top{grid-area:top;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px;}
  .hamb{display:none;border:none;background:transparent;font-size:22px;color:var(--ink-2);}
  .ctx{display:flex;align-items:center;gap:8px;padding:6px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface-2);font-size:13px;color:var(--ink-2);min-width:0;}
  .ctx i:first-child{color:var(--brand);font-size:16px;}
  .ctx .nm{font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .top .right{display:flex;align-items:center;gap:15px;color:var(--ink-2);}
  .top .right i{font-size:20px;}
  .avatar{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}

  .main{grid-area:main;overflow-y:auto;padding:24px 28px 50px;}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:16px;}
  .head h1{font-size:22px;}
  .head .sub{font-size:13px;color:var(--ink-2);margin-top:3px;}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line-2);background:var(--surface);color:var(--ink);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:500;}
  .btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;}
  .btn i{font-size:16px;}
  .pill{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500;white-space:nowrap;}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
  .kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .kpi .v{font-family:var(--display);font-size:25px;font-weight:600;}
  .kpi .l{font-size:12.5px;color:var(--ink-2);display:flex;align-items:center;gap:6px;}
  .kpi .l i{font-size:15px;}

  .filters{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
  .chip{border:1px solid var(--line);background:var(--surface);border-radius:99px;padding:6px 13px;font-size:12.5px;color:var(--ink-2);}
  .chip.on{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:500;}
  .search{margin-left:auto;display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:10px;padding:7px 11px;background:var(--surface);}
  .search input{border:none;outline:none;font-family:var(--body);font-size:13px;width:150px;background:transparent;color:var(--ink);}
  .search i{color:var(--ink-3);font-size:16px;}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
  .cc{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:16px 17px;display:flex;flex-direction:column;}
  .cc h3{font-size:15px;line-height:1.25;}
  .cc .badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .health{display:flex;align-items:center;gap:5px;font-size:11.5px;font-weight:500;white-space:nowrap;}
  .dot{width:9px;height:9px;border-radius:50%;}
  .bar{height:7px;border-radius:99px;background:var(--surface-2);border:1px solid var(--line);overflow:hidden;}
  .reasons{display:flex;flex-wrap:wrap;gap:6px;margin:11px 0 14px;min-height:22px;}
  .reason{font-size:11px;padding:2px 8px;border-radius:6px;display:flex;align-items:center;gap:4px;}
  .ent{margin-top:auto;border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px;}

  .banner{background:var(--brand);color:#fff;border-radius:14px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  .banner .lbl{font-size:11px;color:#AEB8D0;letter-spacing:.05em;text-transform:uppercase;}
  .banner h2{font-size:18px;color:#fff;}
  .banner .bbtn{border:1px solid var(--gold);background:transparent;color:var(--gold);border-radius:9px;padding:8px 13px;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:6px;}
  .cols2{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:18px 20px;}
  .ch{font-family:var(--display);font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px;}
  .ch i{font-size:18px;}
  .stages{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:12px;}
  .stage{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center;}
  .stage .v{font-family:var(--display);font-size:20px;font-weight:600;}
  .stage .l{font-size:10.5px;color:var(--ink-3);}
  .mrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .mrow:last-child{border-bottom:none;}
  .scopenote{text-align:center;font-size:12px;color:var(--ink-3);padding:14px 0 2px;}

  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:30;display:none;}
  @media (max-width:920px){
    .app{grid-template-columns:1fr;grid-template-areas:"top" "main";}
    .side{position:fixed;top:0;left:0;bottom:0;width:var(--side-w);z-index:40;transform:translateX(-100%);transition:transform .2s;box-shadow:0 12px 40px rgba(0,0,0,.14);}
    .side.open{transform:translateX(0);}
    .hamb{display:block;}
    .scrim.show{display:block;}
    .main{padding:18px 14px 40px;}
    .kpis{grid-template-columns:1fr 1fr;}
    .grid{grid-template-columns:1fr;}
    .cols2{grid-template-columns:1fr;}
    .search{margin-left:0;width:100%;} .search input{flex:1;width:100%;}
  }
</style>
</head>
<body>

<div class="scrim" id="scrim"></div>
<div class="app">
  <aside class="side" id="side">
    <div class="brand">
      <svg viewBox="0 0 100 100" width="30" height="30" aria-hidden="true"><path d="M50 5 L88 27 L88 73 L50 95 L12 73 L12 27 Z" fill="none" stroke="var(--gold)" stroke-width="7" stroke-linejoin="round"/><g fill="var(--gold)"><path id="bl" d="M50 50 C 54 33 67 27 79 32 C 67 41 58 51 50 50 Z"/><use href="#bl" transform="rotate(60 50 50)"/><use href="#bl" transform="rotate(120 50 50)"/><use href="#bl" transform="rotate(180 50 50)"/><use href="#bl" transform="rotate(240 50 50)"/><use href="#bl" transform="rotate(300 50 50)"/></g></svg>
      <span class="nm">IONEX<span>360</span></span>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="navfoot"><button class="navitem"><i class="ti ti-logout"></i>Sair</button></div>
  </aside>

  <header class="top">
    <div style="display:flex;align-items:center;gap:12px;min-width:0;">
      <button class="hamb" id="hamb" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
      <div class="ctx" id="ctx"><i class="ti ti-stack-2"></i><span class="nm">Plataforma</span></div>
    </div>
    <div class="right">
      <i class="ti ti-bell" aria-label="Notificações"></i>
      <i class="ti ti-settings" aria-label="Configurações"></i>
      <div class="avatar">SA</div>
    </div>
  </header>

  <main class="main" id="main"></main>
</div>

<script>
  const CLIN = [
    {id:1,n:'Instituto de Cardiologia de Sorriso',fase:'Onboarding',plano:'Starter',prog:33,parada:6,acoes:0,tarefas:1,riscos:0},
    {id:2,n:'Clínica Vida+',fase:'Ativo',plano:'Pro',prog:88,parada:0,acoes:0,tarefas:0,riscos:0},
    {id:3,n:'Saúde Plena',fase:'Implantação',plano:'Enterprise',prog:54,parada:9,acoes:2,tarefas:1,riscos:2},
    {id:4,n:'CardioCenter Cuiabá',fase:'Ativo',plano:'Pro',prog:71,parada:0,acoes:2,tarefas:1,riscos:0},
    {id:5,n:'Odonto Bem-Estar',fase:'Prospect',plano:'Starter',prog:12,parada:0,acoes:0,tarefas:0,riscos:0},
    {id:6,n:'Clínica Norte',fase:'Ativo',plano:'Starter',prog:95,parada:0,acoes:0,tarefas:0,riscos:1}
  ];
  const HL = {ok:['var(--ok)','var(--ok-50)','Saudável'], warn:['var(--warn)','var(--warn-50)','Atenção'], crit:['var(--crit)','var(--crit-50)','Crítico']};
  function health(c){
    let pts=0,r=[];
    if(c.parada>=5){pts+=2;r.push(['ti-map-pin-off','trilha parada '+c.parada+'d']);}
    const at=c.acoes+c.tarefas;
    if(at>=3){pts+=2;r.push(['ti-clock-exclamation',at+' itens em atraso']);}
    else if(at>=1){pts+=1;r.push(['ti-clock-exclamation',at+' em atraso']);}
    if(c.riscos>=1){pts+=2;r.push(['ti-alert-triangle',c.riscos+' risco'+(c.riscos>1?'s':'')+' crítico'+(c.riscos>1?'s':'')]);}
    const level = pts>=4?'crit':pts>=2?'warn':'ok';
    if(!r.length) r.push(['ti-check','tudo em dia']);
    return {level,r};
  }

  /* navegação dos dois modos */
  const NAV_PLAT = [
    ['Plataforma',[['ti-layout-dashboard','Painel',1],['ti-building-hospital','Clínicas',0]]],
    ['Administração',[['ti-template','Modelos',0],['ti-calendar-cog','Templates ICS',0,'sub'],['ti-file-shield','Templates LGPD',0,'sub'],['ti-plug-connected','Integrações',0],['ti-settings','Configurações',0]]]
  ];
  const NAV_CLIN = [
    ['',[['ti-layout-grid','Visão geral',1]]],
    ['Onboarding',[['ti-calendar-event','Agenda',0],['ti-users','Equipe interna',0],['ti-users-group','Equipe externa',0],['ti-key','Sistemas e acessos',0]]],
    ['Operação',[['ti-stethoscope','Diagnóstico',0],['ti-alert-triangle','Mapa de riscos',0],['ti-layout-kanban','Plano de ação',0],['ti-route','Processos',0]]],
    ['Condução',[['ti-presentation','Reuniões',0,'gold'],['ti-share','Delegações',0,'gold']]],
    ['Documentação',[['ti-files','Documentos',0],['ti-photo','Evidências',0]]]
  ];

  let mode='platform', active=null, filter='todas', q='';
  const nav=document.getElementById('nav'), main=document.getElementById('main'), ctx=document.getElementById('ctx');

  function renderNav(){
    const groups = mode==='platform'?NAV_PLAT:NAV_CLIN;
    nav.innerHTML = groups.map(g=>
      (g[0]?`<div class="navgroup">${g[0]}</div>`:'<div style="height:6px"></div>')+
      g[1].map(it=>`<button class="navitem ${it[3]==='sub'?'sub':''} ${it[2]?'active':''}"><i class="ti ${it[0]}"></i><span>${it[1]}</span>${it[3]==='gold'?'<span class="gd"></span>':''}</button>`).join('')
    ).join('');
  }

  function platform(){
    mode='platform'; renderNav();
    ctx.innerHTML='<i class="ti ti-stack-2"></i><span class="nm">Plataforma</span>';
    const counts=CLIN.reduce((a,c)=>{a[health(c).level]++;return a;},{ok:0,warn:0,crit:0});
    const ativas=CLIN.filter(c=>c.fase==='Ativo').length, impl=CLIN.filter(c=>c.fase==='Onboarding'||c.fase==='Implantação').length;
    let h=`<div class="head"><div><h1>Painel da plataforma</h1><div class="sub">Visão de todas as clínicas sob sua gestão</div></div><button class="btn primary"><i class="ti ti-plus"></i>Nova clínica</button></div>`;
    h+=`<div class="kpis">
      <div class="kpi"><div class="v">${CLIN.length}</div><div class="l"><i class="ti ti-building-hospital"></i>Clínicas</div></div>
      <div class="kpi"><div class="v">${ativas}</div><div class="l"><i class="ti ti-circle-check"></i>Ativas</div></div>
      <div class="kpi"><div class="v">${impl}</div><div class="l"><i class="ti ti-rocket"></i>Em implantação</div></div>
      <div class="kpi"><div class="v" style="color:${counts.crit?'var(--crit)':'var(--ink)'}">${counts.warn+counts.crit}</div><div class="l"><i class="ti ti-alert-triangle"></i>Precisam de atenção</div></div></div>`;
    const fc=[['todas','Todas'],['warn','Atenção'],['crit','Críticas'],['impl','Em implantação']];
    h+=`<div class="filters">${fc.map(f=>`<button class="chip ${filter===f[0]?'on':''}" data-f="${f[0]}">${f[1]}</button>`).join('')}<div class="search"><i class="ti ti-search"></i><input id="q" placeholder="Buscar clínica..." value="${q}"></div></div>`;
    let list=CLIN.filter(c=>{const lv=health(c).level;
      if(filter==='warn'&&lv!=='warn')return false; if(filter==='crit'&&lv!=='crit')return false;
      if(filter==='impl'&&!(c.fase==='Onboarding'||c.fase==='Implantação'))return false;
      if(q&&!c.n.toLowerCase().includes(q.toLowerCase()))return false; return true;});
    h+=`<div class="grid">${list.map(c=>{const hh=health(c),hc=HL[hh.level];
      return `<div class="cc"><div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;"><div style="min-width:0;"><h3>${c.n}</h3><div class="badges"><span class="pill" style="background:var(--brand-50);color:var(--brand);">${c.fase}</span><span class="pill" style="background:var(--gold-50);color:var(--gold-600);">${c.plano}</span></div></div><span class="health" style="color:${hc[0]}"><span class="dot" style="background:${hc[0]}"></span>${hc[2]}</span></div>
        <div style="display:flex;align-items:center;gap:10px;"><div class="bar" style="flex:1;"><div style="width:${c.prog}%;height:100%;background:var(--brand);"></div></div><span style="font-size:12px;color:var(--ink-2);width:34px;">${c.prog}%</span></div>
        <div class="reasons">${hh.r.map(x=>`<span class="reason" style="${hh.level!=='ok'?'background:'+hc[1]+';color:'+hc[0]:'background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line)'}"><i class="ti ${x[0]}" style="font-size:13px;"></i>${x[1]}</span>`).join('')}</div>
        <button class="ent" data-id="${c.id}">Entrar na clínica <i class="ti ti-arrow-right" style="font-size:15px;"></i></button></div>`;}).join('')}</div>`;
    main.innerHTML=h;
    main.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{filter=b.dataset.f;platform();});
    main.querySelectorAll('.ent').forEach(b=>b.onclick=()=>clinic(CLIN.find(c=>c.id==b.dataset.id)));
    const qi=document.getElementById('q'); qi.oninput=()=>{q=qi.value;const p=qi.selectionStart;platform();const n=document.getElementById('q');n.focus();n.setSelectionRange(p,p);};
  }

  function clinic(c){
    mode='clinic'; active=c; renderNav();
    ctx.innerHTML=`<i class="ti ti-building-hospital"></i><span class="nm">${c.n}</span><i class="ti ti-chevron-down" style="color:var(--ink-3);font-size:15px;"></i>`;
    let h=`<div class="banner"><div><div class="lbl">Você está dentro de</div><h2>${c.n}</h2></div><div style="display:flex;gap:9px;"><button class="bbtn" id="trocar"><i class="ti ti-switch-horizontal"></i>Trocar de clínica</button><button class="bbtn" id="sair"><i class="ti ti-arrow-left"></i>Sair para a plataforma</button></div></div>`;
    h+=`<div class="kpis">
      <div class="kpi"><div class="v">${c.prog}%</div><div class="l">Score do diagnóstico</div></div>
      <div class="kpi"><div class="v">${c.acoes+5}</div><div class="l">Ações abertas</div></div>
      <div class="kpi"><div class="v">${c.riscos}</div><div class="l">Riscos críticos</div></div>
      <div class="kpi"><div class="v">${c.tarefas+3}</div><div class="l">Tarefas hoje</div></div></div>`;
    h+=`<div class="cols2">
      <div class="card"><div class="ch"><i class="ti ti-layout-kanban" style="color:var(--brand);"></i>Plano de ação</div>
        <div class="stages"><div class="stage"><div class="v">5</div><div class="l">A fazer</div></div><div class="stage"><div class="v">4</div><div class="l">Andamento</div></div><div class="stage"><div class="v">2</div><div class="l">Revisão</div></div><div class="stage"><div class="v">7</div><div class="l">Concluído</div></div></div></div>
      <div class="card"><div class="ch"><i class="ti ti-presentation" style="color:var(--brand);"></i>Próximas reuniões</div>
        <div style="margin-top:6px;">
          <div class="mrow"><span class="pill" style="background:var(--gold-50);color:var(--gold-600);">Kick Off</span><span style="flex:1;font-size:13px;">Reunião de Kick Off</span><span style="font-size:12px;color:var(--ok);">Realizada</span></div>
          <div class="mrow"><span class="pill" style="background:var(--surface-2);color:var(--ink-2);border:1px solid var(--line);">Acomp.</span><span style="flex:1;font-size:13px;">Acompanhamento quinzenal</span><span style="font-size:12px;color:var(--ink-2);">08 jul</span></div>
        </div></div></div>`;
    h+=`<div class="scopenote"><i class="ti ti-lock" style="font-size:13px;vertical-align:-1px;"></i> Somente os dados de ${c.n} estão disponíveis neste modo.</div>`;
    main.innerHTML=h; main.scrollTop=0;
    document.getElementById('sair').onclick=platform;
    document.getElementById('trocar').onclick=platform;
  }

  document.getElementById('hamb').onclick=()=>{document.getElementById('side').classList.toggle('open');document.getElementById('scrim').classList.toggle('show');};
  document.getElementById('scrim').onclick=()=>{document.getElementById('side').classList.remove('open');document.getElementById('scrim').classList.remove('show');};
  platform();
</script>
</body>
</html>
