kind = "web"
previewPath = "/"
title = "CCP IONEX — Clinic Control Panel"
version = "1.0.0"
id = "artifacts/ccp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22570

[services.development]
run = "pnpm --filter @workspace/ccp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ccp", "run", "build" ]
publicDir = "artifacts/ccp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22570"
BASE_PATH = "/"
