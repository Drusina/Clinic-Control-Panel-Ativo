kind = "web"
previewPath = "/"
title = "CCP IONEX — Clinic Control Panel"
version = "1.0.0"
id = "artifacts/ccp"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22570

[services.development]
run = "pnpm --filter @workspace/ccp run dev"

[services.production]
serve = "static"
publicDir = "artifacts/ccp/dist/public"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/ccp", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
PORT = "22570"
BASE_PATH = "/"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
